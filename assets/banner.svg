<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="100%" stop-color="#2d1b4e"/>
    </linearGradient>
    <!-- Clawd path reusable -->
    <path id="clawd" clip-rule="evenodd" d="M20.998 10.949H24v3.102h-3v3.028h-1.487V20H18v-2.921h-1.487V20H15v-2.921H9V20H7.488v-2.921H6V20H4.487v-2.921H3V14.05H0V10.95h3V5h17.998v5.949zM6 10.949h1.488V8.102H6v2.847zm10.51 0H18V8.102h-1.49v2.847z" fill-rule="evenodd"/>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" rx="12" fill="url(#bg)"/>

  <!-- Terminal dots -->
  <circle cx="28" cy="20" r="5" fill="#ff5f56"/>
  <circle cx="46" cy="20" r="5" fill="#ffbd2e"/>
  <circle cx="64" cy="20" r="5" fill="#27c93f"/>

  <!-- ===== Scene: Before vs After ===== -->

  <!-- BEFORE: Tiny confused Clawd (left) -->
  <g transform="translate(55, 100) scale(2.5)">
    <use href="#clawd" fill="#D97757" opacity="0.5"/>
  </g>
  <!-- Sweat drops -->
  <circle cx="110" cy="105" r="3" fill="#5599dd" opacity="0.6"/>
  <circle cx="116" cy="98" r="2" fill="#5599dd" opacity="0.4"/>
  <!-- Question marks -->
  <text x="95" y="95" font-family="monospace" font-weight="bold" font-size="18" fill="#ff6b6b">?</text>
  <text x="112" y="88" font-family="monospace" font-weight="bold" font-size="12" fill="#ff6b6b" opacity="0.6">?</text>
  <!-- "Before" label -->
  <text x="82" y="170" font-family="monospace" font-size="9" fill="#666688">before</text>

  <!-- Arrow -->
  <line x1="140" y1="130" x2="175" y2="130" stroke="#555577" stroke-width="2"/>
  <polygon points="175,125 185,130 175,135" fill="#555577"/>

  <!-- AFTER: Big confident Clawd with sunglasses -->
  <g transform="translate(195, 65) scale(5.5)">
    <use href="#clawd" fill="#D97757"/>
  </g>
  <!-- Sunglasses on big Clawd -->
  <rect x="224" y="101" width="28" height="10" rx="3" fill="#1a1b2e" stroke="#333" stroke-width="1"/>
  <rect x="258" y="101" width="28" height="10" rx="3" fill="#1a1b2e" stroke="#333" stroke-width="1"/>
  <line x1="252" y1="106" x2="258" y2="106" stroke="#333" stroke-width="1.5"/>
  <!-- Lens shine -->
  <rect x="227" y="103" width="6" height="3" rx="1" fill="rgba(255,255,255,0.15)"/>
  <rect x="261" y="103" width="6" height="3" rx="1" fill="rgba(255,255,255,0.15)"/>
  <!-- "After" label -->
  <text x="237" y="195" font-family="monospace" font-size="9" fill="#666688">after</text>

  <!-- Sparkles around big Clawd -->
  <text x="190" y="78" font-size="14">&#x2728;</text>
  <text x="310" y="72" font-size="11">&#x2728;</text>
  <text x="325" y="165" font-size="12">&#x2728;</text>

  <!-- Speech bubble from big Clawd -->
  <rect x="310" y="60" width="120" height="30" rx="8" fill="white" opacity="0.9"/>
  <polygon points="312,85 320,85 308,95" fill="white" opacity="0.9"/>
  <text x="326" y="79" font-family="monospace" font-size="10" fill="#1a1b2e" font-weight="bold">ez CLAUDE.md</text>

  <!-- ===== Text content (right side) ===== -->

  <!-- Main title -->
  <text x="590" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="38" fill="white">Claude Code</text>
  <text x="590" y="133" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="38" fill="#D97757">Template</text>

  <!-- Tagline -->
  <text x="590" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#a0a0c0">Your AI's first day at work, handled.</text>

  <!-- Terminal command preview -->
  <rect x="440" y="185" width="300" height="32" rx="6" fill="#0d0d1a" stroke="#333355" stroke-width="1"/>
  <text x="452" y="205" font-family="monospace" font-size="11" fill="#555577">&gt;</text>
  <text x="465" y="205" font-family="monospace" font-size="11" fill="#D97757">@../Claude-Code-Template/setup-prompt.md</text>

  <!-- Flying file icons (generated files) -->
  <!-- CLAUDE.md file -->
  <g transform="translate(470, 230)">
    <rect width="38" height="14" rx="3" fill="#2a2a4a" stroke="#D97757" stroke-width="0.8"/>
    <text x="4" y="10" font-family="monospace" font-size="6" fill="#D97757">CLAUDE</text>
  </g>
  <!-- rules/ -->
  <g transform="translate(520, 230)">
    <rect width="30" height="14" rx="3" fill="#2a2a4a" stroke="#27c93f" stroke-width="0.8"/>
    <text x="4" y="10" font-family="monospace" font-size="6" fill="#27c93f">rules</text>
  </g>
  <!-- settings -->
  <g transform="translate(562, 230)">
    <rect width="40" height="14" rx="3" fill="#2a2a4a" stroke="#ffbd2e" stroke-width="0.8"/>
    <text x="3" y="10" font-family="monospace" font-size="6" fill="#ffbd2e">settings</text>
  </g>
  <!-- hooks -->
  <g transform="translate(614, 230)">
    <rect width="30" height="14" rx="3" fill="#2a2a4a" stroke="#5599dd" stroke-width="0.8"/>
    <text x="4" y="10" font-family="monospace" font-size="6" fill="#5599dd">hooks</text>
  </g>

  <!-- Tiny parade of Clawds at the bottom -->
  <g transform="translate(50, 260) scale(0.9)">
    <use href="#clawd" fill="#D97757" opacity="0.2"/>
  </g>
  <g transform="translate(80, 258) scale(1.0)">
    <use href="#clawd" fill="#D97757" opacity="0.25"/>
  </g>
  <g transform="translate(115, 255) scale(1.1)">
    <use href="#clawd" fill="#D97757" opacity="0.3"/>
  </g>
  <g transform="translate(155, 252) scale(1.2)">
    <use href="#clawd" fill="#D97757" opacity="0.35"/>
  </g>
</svg>
